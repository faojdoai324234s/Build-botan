name: Windows Build

on:
  push:
    branches: main
  pull_request:
    branches: main
  
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install Visual Studio platform toolset
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\setup.exe" modify --quiet --includeRecommended --includeOptional --downloadThenInstall ^
          --installPath "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise" ^
          --productId Microsoft.VisualStudio.Product.Enterprise ^
          --channelId VisualStudio.17.Release ^
          --add Microsoft.VisualStudio.Component.VC.v141.x86.x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-artifact
          path: ${{github.workspace}}
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 0
